name: Trigger Dependency Builds

on:
  workflow_dispatch:

  # ┌───────────── minute (0 - 59)
  # │ ┌───────────── hour (0 - 23)
  # │ │ ┌───────────── day of the month (1 - 31)
  # │ │ │ ┌───────────── month (1 - 12 or JAN-DEC)
  # │ │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
  # │ │ │ │ │
  # │ │ │ │ │
  # │ │ │ │ │
  # * * * * *
  schedule:
    - cron: '17 6 * * *' # run at 6:17 UTC every day

  # NEVER enable push - this will run infinite for this workflow since of self re-triggering!
  #push:
    #branches:
    #  - 'test/unleash_e2e'

concurrency:
  # Ensure this workflow is running single at a time
  #group: ${{ github.workflow }}-${{ github.ref }}
  #group: ${{ github.workflow }}
  group: ${{ vars.UNLEASH_E2E_TEST_REF }}
  cancel-in-progress: false

# Following variables from vars context are being expected:
#   vars.UNLEASH_E2E_TEST_REF
#   vars.UNLEASH_E2E_TEST_RESET_REF
#   vars.UNLEASH_E2E_TEST_WORKFLOWS_BASE_URL

jobs:
  job_Trigger_DependencySnapshotBuilds:
    name: Trigger Dependency Snapshot Builds
    if: github.ref == vars.UNLEASH_E2E_TEST_REF
    runs-on: ubuntu-latest
    steps:
      # See https://docs.github.com/en/rest/actions/workflows?apiVersion=2022-11-28#create-a-workflow-dispatch-event
      #
      # Define an associative array (bash 4+)
      #declare -A myMap
      #myMap["key1"]="value1"
      #myMap["key2"]="value2"
      #myMap["key3"]="value3"
      #
      # Or declare inline
      #declare -A myMap=(["key1"]="value1" ["key2"]="value2" ["key3"]="value3")
      #
      # Iterate over keys
      #for key in "${!myMap[@]}"; do
      #  echo "Key: $key, Value: ${myMap[$key]}"
      #done
      #
      # Key syntax:
      #   declare -A — declares an associative array
      #   ${!myMap[@]} — expands to all keys
      #   ${myMap[@]} — expands to all values
      #   ${myMap[$key]} — access value by key
      - name: Trigger dependency builds
        run: |
          #
          # map of projects and action to trigger:
          #
          #  key: "<repo_owner>/<repo>@<branch>[@n]"
          #                                      |
          #                                      +- n to be used, if multiple actions for same branch to be triggered
          declare -A PROJECTS_MAP=(
            ["${{ env.REPO_OWNER }}/artifact-spy-plugin@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/maven-cdi-plugin-utils@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/maven-cdi-plugin-hooks@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/unleash-scm-provider-git@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/unleash-maven-plugin@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/unleash-test-sandbox@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/central-publishing-maven-plugin@master"]="build_and_deploy.yml"
            ["${{ env.REPO_OWNER }}/gradle-maven-settings-plugin@master"]="build.yml"
            ["${{ env.REPO_OWNER }}/gradle-maven-settings-plugin@preview"]="build.yml"
            ["${{ env.REPO_OWNER }}/gradle-xtext-builder-plugin@master"]="build.yml"
            ["${{ env.REPO_OWNER }}/gradle-xtext-builder-plugin@preview"]="build.yml"
          )
          # loop through projects
          for KEY in "${!PROJECTS_MAP[@]}"
          do
            GITHUB_ACTION="${PROJECTS_MAP[$KEY]}"
            PROJECT="${KEY%%@*}"
            BRANCH="${KEY#*@}"
            BRANCH="${BRANCH%%@*}"
            echo "Triggering '${GITHUB_ACTION}' on branch '${BRANCH}' of '${PROJECT}'"
            curl -L \
                 --fail-with-body \
                 -X POST \
                 -H "Accept: application/vnd.github+json" \
                 -H "Authorization: Bearer ${{ env.SERVICE_USER_PAT }}" \
                 -H "X-GitHub-Api-Version: 2022-11-28" \
                 "https://api.github.com/repos/${PROJECT}/actions/workflows/${GITHUB_ACTION}/dispatches" \
                 -d '{"ref":"'"${BRANCH}"'"}'
          done
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          SERVICE_USER_PAT: ${{ secrets.SERVICE_USER_PAT }}
